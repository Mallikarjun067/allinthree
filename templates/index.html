<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Docker App</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #0f3460;
        }
        input[type="text"] {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            width: 80%;
        }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
        }
        .btn:hover {
            background: #ff2e63;
            transform: scale(1.05);
        }
        .secondary-btn {
            background: #0f3460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Control Panel 🚀</h1>
        <p>Enter your name to greet the container:</p>
        
        <form action="/greet" method="POST">
            <input type="text" name="username" placeholder="Your Name" required>
            <br>
            <button type="submit" class="btn">Submit Name</button>
        </form>

        <div style="margin-top: 20px;">
            <button class="btn secondary-btn" onclick="alert('Container is healthy!')">Check Status</button>
            <a href="/" class="btn secondary-btn">Reset</a>
        </div>
    </div>
</body>
</html>
